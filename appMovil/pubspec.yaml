name: echoes
description: "Echoes - Aplicación de búsqueda y rescate."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Backend REST
  shared_preferences: ^2.2.3
  dio: ^5.4.3+1

  # Env variables
  flutter_dotenv: ^5.1.0

  # Image picker
  image_picker: ^1.1.2

  # UUID generation
  uuid: ^4.4.0
  flutter_map: ^8.2.2
  http: ^1.2.2
  latlong2: ^0.9.1
  geolocator: ^14.0.2

  # Notificaciones locales (push nativo en Android/iOS)
  flutter_local_notifications: ^18.0.1

  # Image handling and videos
  cached_network_image: ^3.3.1
  video_player: ^2.8.2
  path_provider: ^2.1.5

  # Detección de conectividad de red (módulo offline E9.1)
  connectivity_plus: ^6.1.4

  # Base de datos local SQLite — almacenamiento del cuadrante asignado (E9.3)
  sqflite: ^2.3.3
  path: ^1.9.0        # Requerido por local_database.dart (join de rutas)
  sqflite_common_ffi: ^2.4.0+3

  # Generación y previsualización de PDF (E13 - Módulo de Reporte Final)
  pdf: ^3.10.8
  printing: ^5.12.0
  image: ^4.2.0       # Compresión JPEG real al 60% para optimizar imágenes en el PDF (E13.3)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: SimplyRounded
      fonts:
        - asset: assets/fonts/SimplyRounded.ttf
        - asset: assets/fonts/Roundman.ttf

  assets:
    - .env
    - assets/videos/
    - assets/images/
