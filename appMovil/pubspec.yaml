name: echoes
description: "Echoes - Aplicación de búsqueda y rescate."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Backend REST
  shared_preferences: ^2.2.3
  dio: ^5.4.3+1

  # Env variables
  flutter_dotenv: ^5.1.0

  # Image picker
  image_picker: ^1.1.2

  # UUID generation
  uuid: ^4.4.0
  flutter_map: ^8.2.2
  http: ^1.2.2
  latlong2: ^0.9.1
  geolocator: ^14.0.2

  # Notificaciones locales (push nativo en Android/iOS)
  flutter_local_notifications: ^18.0.1

  # Image handling and videos
  cached_network_image: ^3.3.1
  video_player: ^2.8.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/videos/
    - assets/images/
